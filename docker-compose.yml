version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: osint_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secure_db_password
      POSTGRES_DB: hub_osint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: osint_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: osint_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secure_db_password
      - POSTGRES_DB=hub_osint
      - REDIS_HOST=redis
      - APP_NAME=OSINT & Private Intelligence Hub (Prod)
      - DEBUG=False
      - GEMINI_API_KEY=$GEMINI_API_KEY
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: ./workers/Dockerfile
    container_name: osint_worker
    restart: always
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secure_db_password
      - POSTGRES_DB=hub_osint
      - REDIS_HOST=redis
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: .
      dockerfile: ./workers/Dockerfile
    container_name: osint_beat
    restart: always
    command: celery -A backend.celery_app beat --loglevel=info
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secure_db_password
      - POSTGRES_DB=hub_osint
      - REDIS_HOST=redis
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
